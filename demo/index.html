<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>react-screen-fx — demo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body { font-family: system-ui, -apple-system, sans-serif; background: #111; }

      /* Phone frame */
      #root {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app-frame {
        position: relative;
        width: 390px;
        height: 720px;
        overflow: hidden;
        border-radius: 40px;
        box-shadow: 0 0 0 10px #1a1a1a, 0 40px 80px rgba(0,0,0,0.8);
      }
      @media (max-height: 780px) {
        #app-frame { width: 100%; height: 100%; border-radius: 0; box-shadow: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-frame"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
